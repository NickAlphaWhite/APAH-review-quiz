<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History Curator | GitHub Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 90%; max-width: 1200px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 40px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 20px;
        }

        header { text-align: center; }
        h1 { font-size: 30px; font-weight: 600; margin: 0; color: var(--text-dark); }
        .subtitle { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; }

        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 500px; align-items: center;
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px;
        }
        .gallery img {
            max-height: 450px; max-width: 45%; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s ease;
        }

        .input-section { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #feedback { font-size: 18px; font-weight: 600; height: 26px; }

        input {
            width: 100%; max-width: 600px; padding: 18px 25px;
            font-size: 20px; border: none; border-radius: 18px;
            background: white; text-align: center; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; gap: 12px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-dark); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>AP Art History Curator</h1>
        <div class="subtitle">Path-Aware Match Engine</div>
    </header>

    <div class="gallery" id="image-display">Syncing with GitHub...</div>

    <div class="input-section">
        <div id="feedback"></div>
        <input type="text" id="answer-input" placeholder="Type artwork name..." autocomplete="off">
        <div class="nav-bar">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Previous</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint Word</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>
        <div class="nav-bar">
            <button id="wrong-btn" class="btn btn-secondary" onclick="toggleWrongManual()">Add to Review</button>
            <button id="mode-btn" class="btn btn-secondary" onclick="toggleMode()">Mode: All</button>
        </div>
    </div>

    <div id="status" style="text-align:center; font-size:12px; color:var(--text-light)"></div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;
let wrongList = JSON.parse(localStorage.getItem('ap_ah_vFinal_gh') || '[]');

// 配置你的图片文件夹名称
const IMAGE_FOLDER = "A"; 

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        if (!nRes.ok || !lRes.ok) throw new Error("Files not found");
        
        const nText = await nRes.text();
        const lText = await lRes.text();

        // 解析作品名
        officialData = nText.split('\n')
            .filter(line => /^\s*\d+\./.test(line))
            .map(line => {
                let clean = line.trim().replace(/^\d+\.\s*/, '');
                let coreName = clean.split('.')[0].trim();
                return { name: coreName };
            });

        // 解析 list.txt
        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        
        currentPool = [...officialData];
        shuffle(currentPool);
        init();
    } catch (e) {
        document.getElementById('image-display').innerHTML = `
            <div style="color:var(--error); text-align:center;">
                <h3>Data Sync Failed</h3>
                <p>请确保 index.html, name.txt, list.txt 在同一个 GitHub 仓库根目录。</p>
            </div>`;
    }
}

// 模糊匹配逻辑
function findImages(targetName) {
    const target = targetName.toLowerCase();
    const noise = [
        /site plan/g, /plan/g, /contextual photo/g, /from/g, /detail/g, 
        /exterior/g, /interior/g, /aerial/g, /view/g, /-\d/g, /\.jpg/ig, /\.png/ig
    ];

    return localFiles.filter(file => {
        let f = file.toLowerCase();
        // 1. 直接包含
        if (f.includes(target)) return true;
        // 2. 清理后匹配
        let fClean = f;
        noise.forEach(r => fClean = fClean.replace(r, ''));
        fClean = fClean.trim();
        if (fClean.length < 3) return false;
        return target.includes(fClean) || fClean.includes(target);
    });
}

function loadWork() {
    const work = currentPool[currentIndex];
    const display = document.getElementById('image-display');
    const input = document.getElementById('answer-input');
    
    display.innerHTML = '';
    input.value = '';
    document.getElementById('feedback').innerText = '';
    hintWordIndex = 0;

    const matches = findImages(work.name);

    if (matches.length > 0) {
        matches.forEach(fileName => {
            const img = document.createElement('img');
            // 关键：在这里加上文件夹 A 的路径
            img.src = `${IMAGE_FOLDER}/${encodeURIComponent(fileName)}`;
            display.appendChild(img);
        });
    } else {
        display.innerHTML = `<div style="text-align:center; color:var(--text-light)">
            <p>No Image Match Found:</p>
            <h3 style="color:var(--text-dark)">${work.name}</h3>
        </div>`;
    }

    document.getElementById('status').innerText = `Progress: ${currentIndex + 1} / ${currentPool.length} | Review: ${wrongList.length}`;
}

// 功能函数
function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ') + (hintWordIndex === words.length ? "" : " ");
    }
}

function checkAnswer() {
    const user = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = currentPool[currentIndex].name.toLowerCase();
    if (user === correct) {
        document.getElementById('feedback').innerText = "Beautifully Correct.";
        document.getElementById('feedback').style.color = "var(--success)";
        setTimeout(() => changeWork(1), 1000);
    } else {
        document.getElementById('feedback').innerText = "Check your spelling.";
        document.getElementById('feedback').style.color = "var(--error)";
        if(!wrongList.some(i => i.name === currentPool[currentIndex].name)) {
            wrongList.push(currentPool[currentIndex]);
            saveData();
        }
    }
}

function changeWork(step) {
    currentIndex = (currentIndex + step + currentPool.length) % currentPool.length;
    loadWork();
}

function toggleWrongManual() {
    const item = currentPool[currentIndex];
    const idx = wrongList.findIndex(i => i.name === item.name);
    if (idx > -1) wrongList.splice(idx, 1);
    else wrongList.push(item);
    saveData();
}

function saveData() {
    localStorage.setItem('ap_ah_vFinal_gh', JSON.stringify(wrongList));
    document.getElementById('status').innerText = `Progress: ${currentIndex + 1} / ${currentPool.length} | Review: ${wrongList.length}`;
}

function toggleMode() {
    let isReview = !document.getElementById('mode-btn').innerText.includes('All');
    if (!isReview && wrongList.length === 0) return;
    currentPool = !isReview ? [...wrongList] : [...officialData];
    document.getElementById('mode-btn').innerText = !isReview ? "Mode: Reviewing" : "Mode: All";
    currentIndex = 0;
    loadWork();
}

function shuffle(array) { array.sort(() => Math.random() - 0.5); }
function init() { loadWork(); }
document.getElementById('answer-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

bootstrap();
</script>
</body>
</html>
