<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History Curator | Final Fix</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 90%; max-width: 1200px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 40px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 20px;
        }

        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 500px; align-items: center;
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px;
        }
        .gallery img {
            max-height: 450px; max-width: 45%; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .input-section { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input {
            width: 100%; max-width: 600px; padding: 18px 25px;
            font-size: 20px; border: none; border-radius: 18px;
            background: white; text-align: center; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; gap: 12px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-dark); }
        #status { text-align:center; font-size:12px; color:var(--text-light); }
    </style>
</head>
<body>

<div id="app">
    <header style="text-align: center;">
        <h1 style="margin:0;">AP Art History Curator</h1>
        <div style="font-size:11px; color:var(--text-light); letter-spacing:2px;">GITHUB FOLDER A ENGINE</div>
    </header>

    <div class="gallery" id="image-display">Loading Library...</div>

    <div class="input-section">
        <div id="feedback" style="height:26px; font-weight:600;"></div>
        <input type="text" id="answer-input" placeholder="Type artwork name..." autocomplete="off">
        <div class="nav-bar">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Prev</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>
    </div>
    <div id="status"></div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;

// 图片文件夹的名字
const FOLDER = "A";

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        const nText = await nRes.text();
        const lText = await lRes.text();

        officialData = nText.split('\n')
            .filter(line => /^\s*\d+\./.test(line))
            .map(line => {
                let clean = line.trim().replace(/^\d+\.\s*/, '');
                let rawName = clean.split('.')[0].trim();
                // 移除音符并转为小写用于匹配
                let norm = rawName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                return { name: rawName, norm: norm };
            });

        // 过滤 list.txt，移除潜在的空白行和 \r 符号
        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        
        currentPool = [...officialData];
        shuffle(currentPool);
        loadWork();
    } catch (e) {
        document.getElementById('image-display').innerHTML = "Fetch error. Ensure files are in the same GitHub repo.";
    }
}

function findImages(workObj) {
    const target = workObj.norm;
    // 去噪正则：去掉各种修饰词和文件后缀
    const noise = [/site plan/ig, /plan/ig, /contextual photo/ig, /from/ig, /detail/ig, /-\d/g, /\.jpg/ig, /\.png/ig, /'/g];

    return localFiles.filter(fileName => {
        let f = fileName.toLowerCase();
        if (f.includes(target)) return true;
        
        let fClean = f;
        noise.forEach(r => fClean = fClean.replace(r, ''));
        fClean = fClean.trim();
        
        if (fClean.length < 3) return false;
        return target.includes(fClean) || fClean.includes(target);
    });
}

function loadWork() {
    const work = currentPool[currentIndex];
    const display = document.getElementById('image-display');
    display.innerHTML = '';
    
    const matches = findImages(work);

    if (matches.length > 0) {
        matches.forEach(fileName => {
            const img = document.createElement('img');
            
            /** * 关键修复：
             * 1. 强制使用相对路径 FOLDER + "/" + fileName
             * 2. 使用 encodeURIComponent 对文件名进行编码，解决空格和特殊字符导致的 404
             */
            const encodedName = fileName.split('/').map(part => encodeURIComponent(part)).join('/');
            img.src = `${FOLDER}/${encodedName}`;
            
            img.onerror = () => {
                console.error("404 Not Found:", img.src);
            };
            display.appendChild(img);
        });
    } else {
        display.innerHTML = `<div style="text-align:center; color:var(--text-light)">
            <h3>No Image Found</h3>
            <p>${work.name}</p>
        </div>`;
    }
    document.getElementById('status').innerText = `${currentIndex + 1} / ${currentPool.length}`;
}

// 核心逻辑
function changeWork(step) {
    currentIndex = (currentIndex + step + currentPool.length) % currentPool.length;
    loadWork();
}

function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ');
    }
}

function checkAnswer() {
    const user = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = currentPool[currentIndex].name.toLowerCase();
    const correctNorm = currentPool[currentIndex].norm;
    const feedback = document.getElementById('feedback');

    if (user === correct || user === correctNorm) {
        feedback.innerText = "Beautifully Correct.";
        feedback.style.color = "var(--success)";
        setTimeout(() => changeWork(1), 1000);
    } else {
        feedback.innerText = "Spelling check...";
        feedback.style.color = "var(--error)";
    }
}

function shuffle(array) { array.sort(() => Math.random() - 0.5); }

document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkAnswer();
});

bootstrap();
</script>
</body>
</html>
