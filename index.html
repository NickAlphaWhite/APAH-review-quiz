<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History Curator | Professional Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 90%; max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column; gap: 20px;
        }

        header { text-align: center; margin-bottom: 10px; }
        h1 { font-size: 30px; font-weight: 600; margin: 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; }

        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 450px; align-items: center;
            background: rgba(255,255,255,0.3); border-radius: 20px; padding: 20px;
        }
        .gallery img {
            max-height: 400px; max-width: 45%; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s; cursor: zoom-in;
        }
        .gallery img:hover { transform: scale(1.03); }

        .input-section { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #feedback { font-size: 18px; font-weight: 600; height: 26px; }

        input {
            width: 100%; max-width: 600px; padding: 18px 25px;
            font-size: 20px; border: none; border-radius: 18px;
            background: white; text-align: center; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; gap: 12px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-dark); }
        .btn:active { transform: scale(0.98); }

        .status-bar {
            display: flex; justify-content: space-between; padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05); font-size: 14px; color: var(--text-light);
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>AP Art History Curator</h1>
        <div class="subtitle">Smart-Match Engine Active</div>
    </header>

    <div class="gallery" id="image-display">Initializing Library...</div>

    <div class="input-section">
        <div id="feedback"></div>
        <input type="text" id="answer-input" placeholder="Type name exactly..." autocomplete="off">
        <div class="nav-bar">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Previous</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint Next Word</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>
        <div class="nav-bar">
            <button id="wrong-btn" class="btn btn-secondary" onclick="toggleWrongManual()">Add to Review</button>
            <button id="mode-btn" class="btn btn-secondary" onclick="toggleMode()">Mode: All 250</button>
        </div>
    </div>

    <div class="status-bar">
        <div>Progress: <span id="idx-view" style="color:var(--text-dark)">0</span> / <span id="total-view">0</span></div>
        <div id="file-check">Reading name.txt & list.txt...</div>
        <div>Review: <span id="wrong-count" style="color:var(--error); font-weight:700">0</span></div>
    </div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;
let wrongList = JSON.parse(localStorage.getItem('ap_curator_vFinal') || '[]');

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        const nText = await nRes.text();
        const lText = await lRes.text();

        // 1. 解析作品名 (支持 1. Name 这种格式)
        officialData = nText.split('\n')
            .filter(line => /^\s*\d+\./.test(line))
            .map(line => {
                let clean = line.trim().replace(/^\d+\.\s*/, '');
                let core = clean.split('.')[0].trim();
                return { name: core, fullLine: clean };
            });

        // 2. 解析文件列表
        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 3);

        currentPool = [...officialData];
        shuffle(currentPool);
        
        document.getElementById('file-check').innerText = "Data Synced";
        init();
    } catch (e) {
        document.getElementById('file-check').innerText = "CORS Error: Use a local server or GitHub";
        console.error(e);
    }
}

// 核心：智能匹配引擎
function findImagesFor(workName) {
    const target = workName.toLowerCase();
    
    // 预处理函数：去掉干扰词
    const noise = [/site plan/g, /plan/g, /contextual photo/g, /from/g, /detail/g, /exterior/g, /interior/g, /-\d/g, /\.jpg/g, /\.png/g];
    
    return localFiles.filter(fileName => {
        let f = fileName.toLowerCase();
        let w = target;

        // 情况1：文件名直接包含作品名
        if (f.includes(w)) return true;

        // 情况2：作品名包含文件名核心（去掉plan等干扰后）
        let fClean = f;
        noise.forEach(r => fClean = fClean.replace(r, ''));
        fClean = fClean.trim();
        
        if (fClean.length > 5 && w.includes(fClean)) return true;
        
        return false;
    });
}

function loadWork() {
    const work = currentPool[currentIndex];
    const display = document.getElementById('image-display');
    const input = document.getElementById('answer-input');
    
    display.innerHTML = '';
    input.value = '';
    document.getElementById('feedback').innerText = '';
    hintWordIndex = 0;

    const matches = findImagesFor(work.name);

    if (matches.length > 0) {
        matches.forEach(src => {
            const img = document.createElement('img');
            img.src = encodeURIComponent(src);
            display.appendChild(img);
        });
    } else {
        display.innerHTML = `<div style="text-align:center; color:var(--text-light)">
            <p>No Images matched keywords for:</p>
            <h3 style="color:var(--text-dark)">${work.name}</h3>
            <p style="font-size:12px">Check if file names in list.txt match this title.</p>
        </div>`;
    }

    document.getElementById('idx-view').innerText = currentIndex + 1;
    document.getElementById('total-view').innerText = currentPool.length;
    updateWrongBtnUI();
}

// 其余功能保持高效逻辑...
function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ') + (hintWordIndex === words.length ? "" : " ");
    }
}

function checkAnswer() {
    const userAns = document.getElementById('answer-input').value.trim().toLowerCase();
    const correctAns = currentPool[currentIndex].name.toLowerCase();
    const feedback = document.getElementById('feedback');

    if (userAns === correctAns) {
        feedback.innerText = "Beautifully Correct.";
        feedback.style.color = "var(--success)";
        setTimeout(() => changeWork(1), 1000);
    } else {
        feedback.innerText = "Check your spelling.";
        feedback.style.color = "var(--error)";
        if(!wrongList.some(i => i.name === currentPool[currentIndex].name)) {
            wrongList.push(currentPool[currentIndex]);
            saveData();
        }
    }
}

function changeWork(step) {
    currentIndex = (currentIndex + step + currentPool.length) % currentPool.length;
    loadWork();
}

function toggleWrongManual() {
    const item = currentPool[currentIndex];
    const idx = wrongList.findIndex(i => i.name === item.name);
    if (idx > -1) wrongList.splice(idx, 1);
    else wrongList.push(item);
    saveData();
    updateWrongBtnUI();
}

function saveData() {
    localStorage.setItem('ap_curator_vFinal', JSON.stringify(wrongList));
    document.getElementById('wrong-count').innerText = wrongList.length;
}

function updateWrongBtnUI() {
    const isStored = wrongList.some(i => i.name === currentPool[currentIndex].name);
    document.getElementById('wrong-btn').innerText = isStored ? "Remove from Review" : "Add to Review";
}

function toggleMode() {
    let isReview = !document.getElementById('mode-btn').innerText.includes('All');
    if (!isReview && wrongList.length === 0) { alert("Review List is Empty"); return; }
    currentPool = !isReview ? [...wrongList] : [...officialData];
    document.getElementById('mode-btn').innerText = !isReview ? "Mode: Reviewing" : "Mode: All 250";
    currentIndex = 0;
    loadWork();
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function init() {
    document.getElementById('total-view').innerText = currentPool.length;
    document.getElementById('wrong-count').innerText = wrongList.length;
    loadWork();
}

document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkAnswer();
});

bootstrap();
</script>
</body>
</html>
