<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History Curator | Manager Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --review: #ff9500;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 95%; max-width: 1200px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 30px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 15px;
        }

        /* 列表管理面板样式 */
        #manager-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .manager-content {
            background: white; width: 90%; max-width: 800px; height: 80vh;
            border-radius: 25px; padding: 30px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .search-box {
            width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box;
        }
        .list-container {
            flex: 1; overflow-y: auto; border-radius: 10px; background: #f9f9f9; padding: 10px;
        }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #eee; font-size: 14px;
        }
        .list-item:hover { background: #f0f0f0; }
        .remove-btn { color: var(--error); cursor: pointer; font-weight: bold; border: none; background: none; }
        .add-btn { color: var(--success); cursor: pointer; font-weight: bold; border: none; background: none; }

        /* 原有样式保持 */
        header { text-align: center; }
        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 450px; align-items: center; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 15px;
        }
        .gallery img { max-height: 400px; max-width: 48%; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .input-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input#answer-input {
            width: 100%; max-width: 600px; padding: 16px 20px; font-size: 18px; border: none; border-radius: 15px;
            background: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); outline: none;
        }
        .nav-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-dark); }
        .btn-review { background: var(--review); color: white; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1 style="margin:0;">APAH Curator Pro</h1>
        <div id="mode-indicator" style="font-size: 10px; color: var(--accent); letter-spacing: 1px;">MODE: ALL 250</div>
    </header>

    <div class="gallery" id="image-display">Syncing...</div>

    <div class="input-section">
        <div id="feedback" style="height:24px; font-weight:600;"></div>
        <input type="text" id="answer-input" placeholder="Enter name..." autocomplete="off">
        
        <div class="nav-bar">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Prev</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>

        <div class="nav-bar">
            <button id="wrong-btn" class="btn btn-secondary" onclick="toggleWrongManual()">Add/Remove Review</button>
            <button class="btn btn-secondary" onclick="openManager()">Manage Review List</button>
        </div>
        <button id="mode-btn" class="btn btn-secondary" style="max-width:600px; width:100%" onclick="toggleMode()">Switch Mode</button>
    </div>
</div>

<div id="manager-overlay">
    <div class="manager-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">Review List Manager</h2>
            <button onclick="closeManager()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <input type="text" class="search-box" id="manager-search" placeholder="Search across all 250 works to add/remove..." oninput="renderManagerList()">
        <div style="font-size:12px; color:var(--text-light);">Showing Review List & Search Results</div>
        <div class="list-container" id="manager-list"></div>
        <button class="btn btn-primary" onclick="closeManager()">Done</button>
    </div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;
let wrongList = JSON.parse(localStorage.getItem('ap_ah_review_v5') || '[]');

const FOLDER = "A";

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        const nText = await nRes.text();
        const lText = await lRes.text();

        officialData = nText.split('\n')
            .filter(line => /^\s*\d+\./.test(line))
            .map(line => {
                let clean = line.trim().replace(/^\d+\.\s*/, '');
                let rawName = clean.split('.')[0].trim();
                let norm = rawName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                return { name: rawName, norm: norm };
            });

        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        currentPool = [...officialData];
        shuffle(currentPool);
        loadWork();
    } catch (e) { console.error(e); }
}

// 路径编码与图片查找
function findImages(workObj) {
    const target = workObj.norm;
    const noise = [/site plan/ig, /plan/ig, /contextual photo/ig, /from/ig, /detail/ig, /-\d/g, /\.jpg/ig, /\.png/ig, /'/g];
    return localFiles.filter(fileName => {
        let f = fileName.toLowerCase();
        if (f.includes(target)) return true;
        let fClean = f;
        noise.forEach(r => fClean = fClean.replace(r, ''));
        return fClean.trim().length > 3 && (target.includes(fClean.trim()) || fClean.trim().includes(target));
    });
}

function loadWork() {
    if (currentPool.length === 0) {
        document.getElementById('image-display').innerHTML = "<h3>Review List is empty.</h3>";
        return;
    }
    const work = currentPool[currentIndex];
    const display = document.getElementById('image-display');
    display.innerHTML = '';
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').innerText = '';
    hintWordIndex = 0;

    findImages(work).forEach(fileName => {
        const img = document.createElement('img');
        img.src = `${FOLDER}/${fileName.split('/').map(p => encodeURIComponent(p)).join('/')}`;
        display.appendChild(img);
    });
    updateUI();
}

// 管理面板逻辑
function openManager() {
    document.getElementById('manager-overlay').style.display = 'flex';
    renderManagerList();
}
function closeManager() {
    document.getElementById('manager-overlay').style.display = 'none';
    if (document.getElementById('mode-indicator').innerText.includes('REVIEW')) {
        currentPool = [...wrongList];
        currentIndex = 0;
        loadWork();
    }
}
function renderManagerList() {
    const searchTerm = document.getElementById('manager-search').value.toLowerCase();
    const container = document.getElementById('manager-list');
    container.innerHTML = '';

    // 如果没有搜素，显示错题本内容。如果有搜索，显示搜索结果。
    const listToDisplay = searchTerm ? officialData.filter(i => i.norm.includes(searchTerm)) : wrongList;

    listToDisplay.forEach(item => {
        const isInReview = wrongList.some(w => w.name === item.name);
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
            <span>${item.name}</span>
            <button class="${isInReview ? 'remove-btn' : 'add-btn'}" onclick="toggleReviewByName('${item.name.replace(/'/g, "\\'")}')">
                ${isInReview ? 'Remove' : 'Add'}
            </button>
        `;
        container.appendChild(div);
    });
}

function toggleReviewByName(name) {
    const idx = wrongList.findIndex(i => i.name === name);
    if (idx > -1) wrongList.splice(idx, 1);
    else {
        const item = officialData.find(i => i.name === name);
        if (item) wrongList.push(item);
    }
    saveReview();
    renderManagerList();
    updateUI();
}

// 基础逻辑保持
function saveReview() {
    localStorage.setItem('ap_ah_review_v5', JSON.stringify(wrongList));
}
function toggleWrongManual() {
    const work = currentPool[currentIndex];
    toggleReviewByName(work.name);
}
function toggleMode() {
    const isReviewMode = document.getElementById('mode-indicator').innerText.includes('REVIEW');
    if (!isReviewMode) {
        if (wrongList.length === 0) return alert("Review List Empty");
        currentPool = [...wrongList];
        document.getElementById('mode-indicator').innerText = "MODE: REVIEW LIST";
    } else {
        currentPool = [...officialData];
        document.getElementById('mode-indicator').innerText = "MODE: ALL 250";
    }
    currentIndex = 0;
    shuffle(currentPool);
    loadWork();
}
function updateUI() {
    const isStored = currentPool.length > 0 && wrongList.some(i => i.name === currentPool[currentIndex].name);
    const btn = document.getElementById('wrong-btn');
    btn.className = isStored ? "btn btn-review" : "btn btn-secondary";
    btn.innerText = isStored ? "Remove from Review" : "Add to Review";
}
function changeWork(step) {
    if (currentPool.length === 0) return;
    currentIndex = (currentIndex + step + currentPool.length) % currentPool.length;
    loadWork();
}
function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ');
    }
}
function shuffle(array) { array.sort(() => Math.random() - 0.5); }
document.getElementById('answer-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
function checkAnswer() {
    const user = document.getElementById('answer-input').value.trim().toLowerCase();
    const work = currentPool[currentIndex];
    if (user === work.name.toLowerCase() || user === work.norm) {
        document.getElementById('feedback').innerText = "Correct!";
        setTimeout(() => changeWork(1), 800);
    } else {
        document.getElementById('feedback').innerText = "Wrong!";
        if (!wrongList.some(i => i.name === work.name)) {
            wrongList.push(work);
            saveReview();
            updateUI();
        }
    }
}
bootstrap();
</script>
</body>
</html>
