<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAH Quiz</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --review: #ff9500;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 95%; max-width: 1200px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 30px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 15px;
        }

        /* 模态框样式 */
        #info-overlay, #manager-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        
        .manager-content {
            background: white; width: 90%; max-width: 800px; height: 85vh;
            border-radius: 25px; padding: 25px; display: flex; flex-direction: column; gap: 15px;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .manager-footer {
            display: flex; justify-content: flex-end; gap: 10px;
            padding-top: 15px; border-top: 1px solid #eee;
        }

        .list-container { flex: 1; overflow-y: auto; background: #f9f9f9; border-radius: 10px; padding: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }

        .btn { padding: 10px 18px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #f2f2f7; color: var(--text-dark); }
        .btn-review { background: var(--review); color: white; }
        .btn-fixed-width { min-width: 85px; }

        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 450px; align-items: center; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 15px;
        }
        .gallery img { max-height: 400px; max-width: 48%; border-radius: 12px; cursor: zoom-in; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .input-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input#answer-input {
            width: 100%; max-width: 600px; padding: 16px 20px; font-size: 18px; border: none; border-radius: 15px;
            background: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); outline: none;
        }
        .main-nav { display:flex; gap:10px; width:100%; max-width:600px; }
        .main-nav .btn { flex: 1; }
    </style>
</head>
<body>

<div id="app">
    <header style="text-align: center;">
        <h1 style="margin:0; font-size: 22px;">APAH Quiz (Name)</h1>
        <div id="mode-indicator" style="font-size: 10px; color: var(--accent); letter-spacing: 1px; font-weight: 700;">MODE: ALL 250</div>
    </header>

    <div class="gallery" id="image-display">Loading...</div>

    <div class="input-section">
        <div id="feedback" style="height:20px; font-size:14px; font-weight:600;"></div>
        <input type="text" id="answer-input" placeholder="Type name..." autocomplete="off">
        <div class="main-nav">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Prev</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>
        <div class="main-nav">
            <button id="wrong-btn" class="btn btn-secondary" onclick="toggleWrongManual()">Add to Review</button>
            <button class="btn btn-secondary" onclick="openManager()">Manage Review</button>
        </div>
        <button id="mode-btn" class="btn btn-secondary" style="width:100%; max-width:600px;" onclick="toggleMode()">Switch Mode</button>
    </div>
</div>

<div id="info-overlay" onclick="closeInfo()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="info-title" style="margin:0; color:var(--accent);"></h3>
        <p id="info-desc" style="line-height:1.7; margin:20px 0; text-align:left; background:#f9f9f9; padding:15px; border-radius:15px; font-size: 14px;"></p>
        <button class="btn btn-secondary" style="width:100px" onclick="closeInfo()">Close</button>
    </div>
</div>

<div id="manager-overlay">
    <div class="manager-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; font-size:18px;">Review List Manager</h2>
            <button onclick="closeManager()" style="border:none; background:none; font-size:24px; cursor:pointer; color: #ccc;">&times;</button>
        </div>
        <input type="text" id="manager-search" placeholder="Search..." oninput="renderManagerList()" style="padding:10px; border-radius:10px; border:1px solid #eee; outline:none;">
        <div class="list-container" id="manager-list"></div>
        <div class="manager-footer">
            <button class="btn btn-secondary btn-fixed-width" onclick="closeManager()">Cancel</button>
            <button class="btn btn-primary btn-fixed-width" onclick="closeManager()">Done</button>
        </div>
    </div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;
let wrongList = JSON.parse(localStorage.getItem('ap_ah_review_v11') || '[]');

const FOLDER = "A";

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        const nText = await nRes.text();
        const lText = await lRes.text();

        officialData = nText.split('\n').filter(line => /^\s*\d+\./.test(line)).map(line => {
            let fullStr = line.trim().replace(/^\d+\.\s*/, '');
            let firstDot = fullStr.indexOf('.');
            let rawName = firstDot !== -1 ? fullStr.substring(0, firstDot).trim() : fullStr;
            let infoText = firstDot !== -1 ? fullStr.substring(firstDot + 1).trim() : "";
            let norm = rawName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/['’]/g, "");
            return { name: rawName, info: infoText, norm: norm };
        });

        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        currentPool = [...officialData];
        shuffle(currentPool);
        loadWork();
    } catch (e) { console.error(e); }
}

function loadWork() {
    const display = document.getElementById('image-display');
    if (currentPool.length === 0) {
        display.innerHTML = "<h3>List empty.</h3>";
        return;
    }
    const work = currentPool[currentIndex];
    display.innerHTML = '';
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').innerText = '';
    hintWordIndex = 0;

    // 核心修改：使用严格的包含判定，避免“Apollo”匹配到“Apollo 11 stones”的情况
    const target = work.norm;
    localFiles.filter(fileName => {
        let f = fileName.toLowerCase().replace(/[’¡¯']/g, "");
        // 只有当文件名包含完整的目标名字时才显示
        return f.includes(target);
    }).forEach(fileName => {
        const img = document.createElement('img');
        const encodedPath = fileName.split('/').map(p => encodeURIComponent(p)).join('/');
        img.src = `${FOLDER}/${encodedPath}`;
        img.onclick = () => showInfo(work);
        display.appendChild(img);
    });
    updateUI();
}

function toggleWrongManual() {
    const work = currentPool[currentIndex];
    if (!work) return;
    const idx = wrongList.findIndex(i => i.name === work.name);
    if (idx > -1) wrongList.splice(idx, 1);
    else wrongList.push(work);
    saveReview();
    updateUI();
}

function checkAnswer() {
    const user = document.getElementById('answer-input').value.trim().toLowerCase().replace(/['’]/g, "");
    const work = currentPool[currentIndex];
    const feedback = document.getElementById('feedback');

    // 严格匹配检查
    if (user === work.name.toLowerCase().replace(/['’]/g, "") || user === work.norm) {
        feedback.innerText = "Correct!";
        feedback.style.color = "var(--success)";
        const rIdx = wrongList.findIndex(i => i.name === work.name);
        if (rIdx > -1) {
            wrongList.splice(rIdx, 1);
            saveReview();
        }
        setTimeout(() => changeWork(1), 800);
    } else {
        feedback.innerText = "Wrong!";
        feedback.style.color = "var(--error)";
        if (!wrongList.some(i => i.name === work.name)) {
            wrongList.push(work);
            saveReview();
        }
    }
    updateUI();
}

function renderManagerList() {
    const searchTerm = document.getElementById('manager-search').value.toLowerCase();
    const container = document.getElementById('manager-list');
    container.innerHTML = '';
    const listToDisplay = searchTerm ? officialData.filter(i => i.norm.includes(searchTerm)) : wrongList;
    
    listToDisplay.forEach(item => {
        const isInReview = wrongList.some(w => w.name === item.name);
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<span>${item.name}</span>`;
        
        const btn = document.createElement('button');
        btn.innerText = isInReview ? 'Remove' : 'Add';
        btn.style.color = isInReview ? '#ff3b30' : '#34c759';
        btn.style.fontWeight = '700'; btn.style.border = 'none'; btn.style.background = 'none'; btn.style.cursor = 'pointer';
        
        btn.onclick = () => {
            toggleReviewByName(item.name);
            renderManagerList();
        };
        div.appendChild(btn);
        container.appendChild(div);
    });
}

function toggleReviewByName(name) {
    const idx = wrongList.findIndex(i => i.name === name);
    if (idx > -1) wrongList.splice(idx, 1);
    else {
        const item = officialData.find(i => i.name === name);
        if (item) wrongList.push(item);
    }
    saveReview();
    updateUI();
}

function saveReview() { localStorage.setItem('ap_ah_review_v11', JSON.stringify(wrongList)); }
function openManager() { document.getElementById('manager-overlay').style.display = 'flex'; renderManagerList(); }
function closeManager() { document.getElementById('manager-overlay').style.display = 'none'; }

function toggleMode() {
    const isReviewMode = document.getElementById('mode-indicator').innerText.includes('REVIEW');
    if (!isReviewMode) {
        if (wrongList.length === 0) return alert("Review List is empty!");
        currentPool = [...wrongList];
        document.getElementById('mode-indicator').innerText = "MODE: REVIEW LIST";
    } else {
        currentPool = [...officialData];
        document.getElementById('mode-indicator').innerText = "MODE: ALL 250";
    }
    currentIndex = 0; shuffle(currentPool); loadWork();
}

function updateUI() {
    if (currentPool.length === 0) return;
    const isStored = wrongList.some(i => i.name === currentPool[currentIndex].name);
    const btn = document.getElementById('wrong-btn');
    btn.className = isStored ? "btn btn-review" : "btn btn-secondary";
    btn.innerText = isStored ? "In Review List" : "Add to Review";
}

function showInfo(work) {
    document.getElementById('info-title').innerText = work.name;
    document.getElementById('info-desc').innerText = work.info || "No details.";
    document.getElementById('info-overlay').style.display = 'flex';
}
function closeInfo() { document.getElementById('info-overlay').style.display = 'none'; }
function changeWork(step) { if (currentPool.length === 0) return; currentIndex = (currentIndex + step + currentPool.length) % currentPool.length; loadWork(); }
function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ');
    }
}
function shuffle(array) { array.sort(() => Math.random() - 0.5); }
document.getElementById('answer-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
bootstrap();
</script>
</body>
</html>
