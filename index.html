<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History Curator | Study Pro</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --text-dark: #1d1d1f;
            --text-light: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --review: #ff9500;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #e8f5e9 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 95%; max-width: 1200px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 30px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 15px;
        }

        header { text-align: center; }
        h1 { font-size: 26px; font-weight: 600; margin: 0; }
        
        .gallery {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            min-height: 480px; align-items: center;
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 15px;
            overflow: hidden;
        }
        .gallery img {
            max-height: 420px; max-width: 48%; border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }

        .input-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #feedback { height: 24px; font-weight: 600; font-size: 18px; }

        input {
            width: 100%; max-width: 600px; padding: 16px 20px;
            font-size: 18px; border: none; border-radius: 15px;
            background: white; text-align: center; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-dark); }
        .btn-review { background: var(--review); color: white; }

        .status-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05);
            font-size: 13px; color: var(--text-light);
        }
        .highlight { color: var(--text-dark); font-weight: 700; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>AP Art History Curator</h1>
        <div id="mode-indicator" style="font-size: 10px; color: var(--accent); letter-spacing: 1px; margin-top: 4px;">PRACTICE MODE: ALL 250</div>
    </header>

    <div class="gallery" id="image-display">Syncing Library...</div>

    <div class="input-section">
        <div id="feedback"></div>
        <input type="text" id="answer-input" placeholder="Type artwork name..." autocomplete="off">
        
        <div class="nav-bar">
            <button class="btn btn-secondary" onclick="changeWork(-1)">Previous</button>
            <button class="btn btn-primary" onclick="showNextWordHint()">Hint Word</button>
            <button class="btn btn-secondary" onclick="changeWork(1)">Next</button>
        </div>

        <div class="nav-bar">
            <button id="wrong-btn" class="btn btn-secondary" onclick="toggleWrongManual()">Add to Review</button>
            <button id="mode-btn" class="btn btn-secondary" onclick="toggleMode()">Switch to Review List</button>
        </div>
    </div>

    <div class="status-footer">
        <div>Item: <span id="idx-view" class="highlight">0</span> / <span id="total-view">0</span></div>
        <div>Review List: <span id="wrong-count" style="color:var(--error); font-weight:700">0</span></div>
    </div>
</div>

<script>
let officialData = [];
let localFiles = [];
let currentPool = [];
let currentIndex = 0;
let hintWordIndex = 0;
let wrongList = JSON.parse(localStorage.getItem('ap_ah_review_v4') || '[]');

const FOLDER = "A"; 

async function bootstrap() {
    try {
        const [nRes, lRes] = await Promise.all([fetch('name.txt'), fetch('list.txt')]);
        const nText = await nRes.text();
        const lText = await lRes.text();

        officialData = nText.split('\n')
            .filter(line => /^\s*\d+\./.test(line))
            .map(line => {
                let clean = line.trim().replace(/^\d+\.\s*/, '');
                let rawName = clean.split('.')[0].trim();
                let norm = rawName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                return { name: rawName, norm: norm };
            });

        localFiles = lText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        
        currentPool = [...officialData];
        shuffle(currentPool);
        init();
    } catch (e) {
        document.getElementById('image-display').innerHTML = "Failed to load data. Check GitHub path.";
    }
}

function findImages(workObj) {
    const target = workObj.norm;
    const noise = [/site plan/ig, /plan/ig, /contextual photo/ig, /from/ig, /detail/ig, /-\d/g, /\.jpg/ig, /\.png/ig, /'/g];

    return localFiles.filter(fileName => {
        let f = fileName.toLowerCase();
        if (f.includes(target)) return true;
        let fClean = f;
        noise.forEach(r => fClean = fClean.replace(r, ''));
        fClean = fClean.trim();
        return fClean.length > 3 && (target.includes(fClean) || fClean.includes(target));
    });
}

function loadWork() {
    const work = currentPool[currentIndex];
    const display = document.getElementById('image-display');
    display.innerHTML = '';
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').innerText = '';
    hintWordIndex = 0;

    const matches = findImages(work);

    if (matches.length > 0) {
        matches.forEach(fileName => {
            const img = document.createElement('img');
            const encodedName = fileName.split('/').map(part => encodeURIComponent(part)).join('/');
            img.src = `${FOLDER}/${encodedName}`;
            display.appendChild(img);
        });
    } else {
        display.innerHTML = `<div style="text-align:center; color:var(--text-light)"><h3>No Image Match</h3><p>${work.name}</p></div>`;
    }
    updateStatus();
}

function checkAnswer() {
    const user = document.getElementById('answer-input').value.trim().toLowerCase();
    const work = currentPool[currentIndex];
    const feedback = document.getElementById('feedback');

    if (user === work.name.toLowerCase() || user === work.norm) {
        feedback.innerText = "Beautifully Correct.";
        feedback.style.color = "var(--success)";
        setTimeout(() => changeWork(1), 1000);
    } else {
        feedback.innerText = "Keep trying...";
        feedback.style.color = "var(--error)";
        // 答错自动加入错题本
        addToReview(work);
    }
}

function addToReview(work) {
    if (!wrongList.some(item => item.name === work.name)) {
        wrongList.push(work);
        saveReview();
    }
}

function toggleWrongManual() {
    const work = currentPool[currentIndex];
    const idx = wrongList.findIndex(item => item.name === work.name);
    if (idx > -1) {
        wrongList.splice(idx, 1);
    } else {
        wrongList.push(work);
    }
    saveReview();
    updateStatus();
}

function saveReview() {
    localStorage.setItem('ap_ah_review_v4', JSON.stringify(wrongList));
    document.getElementById('wrong-count').innerText = wrongList.length;
}

function toggleMode() {
    const isMainMode = document.getElementById('mode-btn').innerText.includes('Review');
    if (isMainMode) {
        if (wrongList.length === 0) {
            alert("Your Review List is empty!");
            return;
        }
        currentPool = [...wrongList];
        document.getElementById('mode-btn').innerText = "Switch to All 250";
        document.getElementById('mode-indicator').innerText = "PRACTICE MODE: REVIEW LIST";
    } else {
        currentPool = [...officialData];
        document.getElementById('mode-btn').innerText = "Switch to Review List";
        document.getElementById('mode-indicator').innerText = "PRACTICE MODE: ALL 250";
    }
    currentIndex = 0;
    shuffle(currentPool);
    loadWork();
}

function updateStatus() {
    document.getElementById('idx-view').innerText = currentIndex + 1;
    document.getElementById('total-view').innerText = currentPool.length;
    document.getElementById('wrong-count').innerText = wrongList.length;
    
    // 更新错题按钮状态
    const isStored = wrongList.some(item => item.name === currentPool[currentIndex].name);
    const btn = document.getElementById('wrong-btn');
    btn.innerText = isStored ? "Remove from Review" : "Add to Review";
    btn.className = isStored ? "btn btn-review" : "btn btn-secondary";
}

function changeWork(step) {
    if (currentPool.length === 0) return;
    currentIndex = (currentIndex + step + currentPool.length) % currentPool.length;
    loadWork();
}

function showNextWordHint() {
    const words = currentPool[currentIndex].name.split(' ');
    if (hintWordIndex < words.length) {
        hintWordIndex++;
        document.getElementById('answer-input').value = words.slice(0, hintWordIndex).join(' ');
    }
}

function shuffle(array) { array.sort(() => Math.random() - 0.5); }
function init() { loadWork(); }

document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkAnswer();
});

bootstrap();
</script>
</body>
</html>
