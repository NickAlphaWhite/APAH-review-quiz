name: Auto Update List

on:
  push:
    paths:
      - 'A/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cleaned list.txt
        run: |
          # 进入 A 文件夹进行查找，这样输出的文件名就不带 "A/" 前缀了
          cd A
          find . -type f | sed 's|^\./||' > ../list.txt
          cd ..
          echo "Updated list.txt with $(wc -l < list.txt) files (Paths cleaned)."

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add list.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update cleaned list.txt" && git push)
